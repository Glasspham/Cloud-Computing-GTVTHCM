spring.application.name=CodeBaseSpringJpa

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://10.8.0.2:3306/doanyte?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1
spring.jpa.show-sql=true

spring.jpa.hibernate.ddl-auto=update

# Tối ưu đọc dữ liệu
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.default_batch_fetch_size=50
spring.jpa.open-in-view=false

# Tối ưu ghi dữ liệu lớn
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

jwt.SECRET_KEY = 12345678910abcdefghijklmoparstuv
jwt.JWT_EXPIRATION = 604800000

spring.servlet.multipart.max-file-size=1000MB
spring.servlet.multipart.max-request-size=1000MB

# Cấu hình cho Actuator và Prometheus
management.endpoints.web.exposure.include=prometheus,health,info
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=CodeBaseSpringJpa

# Cấu hình để serve static files từ classpath
spring.web.resources.static-locations=classpath:/static/, file:/app/static/
spring.mvc.static-path-pattern=/files/**
server.port=8080
server.address=0.0.0.0